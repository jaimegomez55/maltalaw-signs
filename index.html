    <!-- SCHEMA — LOCAL BUSINESS -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "SignReady",
      "description": "MTA compliant short let licence signs for holiday furnished premises in Malta and Gozo. Custom made from €29, delivered in 3 days.",
      "url": "https://www.shortletsignmalta.com",
      "logo": "https://www.shortletsignmalta.com/logo.png",
      "areaServed": ["Malta", "Gozo"],
      "serviceType": "Short Let Licence Sign",
      "priceRange": "€29 - €120",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "signreadymalta@gmail.com",
        "availableLanguage": ["English", "Maltese"]
      },
      "offers": [
        {
          "@type": "Offer",
          "name": "Basic MTA Licence Sign",
          "priceCurrency": "EUR",
          "price": "29",
          "description": "Weatherproof acrylic MTA compliant sign for holiday furnished premises in Malta"
        },
        {
          "@type": "Offer",
          "name": "Standard MTA Licence Sign",
          "priceCurrency": "EUR",
          "price": "59",
          "description": "Aluminium panel, fully customised with MTA licence number and contact details. Fixings included."
        },
        {
          "@type": "Offer",
          "name": "Premium MTA Licence Sign",
          "priceCurrency": "EUR",
          "price": "120",
          "description": "Brushed aluminium with laser engraving. For villas and luxury properties."
        }
      ]
    }

    <!-- SCHEMA — FAQ (clave para AEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do I need a sign for my short let in Malta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The Tourism Accommodation Regulations 2026 require all short let properties in Malta and Gozo to display a licence sign at the property entrance before June 2026. Operating without one risks a 3-year disqualification."
          }
        },
        {
          "@type": "Question",
          "name": "What must a Malta short let sign include?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The sign must display the MTA licence number, the name of the contact person, and a 24/7 phone number. SignReady produces fully MTA compliant signs from €29."
          }
        },
        {
          "@type": "Question",
          "name": "What is the deadline for the Malta short let sign?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "June 2026. The new Tourism Accommodation Regulations 2026 published by the Malta Tourism Authority require all licensed short let properties to display a compliant sign before this date."
          }
        },
        {
          "@type": "Question",
          "name": "How much does a short let sign cost in Malta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SignReady offers three options: Basic acrylic from €29, Standard aluminium from €59, and Premium laser-engraved aluminium from €120. Installation is available for €45."
          }
        },
        {
          "@type": "Question",
          "name": "How quickly can I get my short let sign in Malta?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "SignReady delivers custom MTA compliant signs across Malta and Gozo within 3 working days."
          }
        }
      ]
    }
